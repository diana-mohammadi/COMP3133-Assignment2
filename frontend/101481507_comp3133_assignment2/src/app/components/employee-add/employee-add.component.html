<div class="container mt-4">
  <div class="card p-4 shadow mx-auto form-card">
    <h2 class="mb-4 text-center">Add Employee</h2>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">First Name</label>
        <input [(ngModel)]="employee.firstName" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Last Name</label>
        <input [(ngModel)]="employee.lastName" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Email</label>
        <input [(ngModel)]="employee.email" type="email" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Phone</label>
        <input [(ngModel)]="employee.phone" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Department</label>
        <input [(ngModel)]="employee.department" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Position</label>
        <input [(ngModel)]="employee.position" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Salary</label>
        <input [(ngModel)]="employee.salary" type="number" class="form-control">
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Date of Joining</label>
        <input [(ngModel)]="employee.dateOfJoining" type="date" class="form-control">
      </div>

      <div class="col-md-12 mb-3">
        <label class="form-label">Profile Picture URL</label>
        <input [(ngModel)]="employee.profilePicture" class="form-control" placeholder="Paste image URL">
      </div>
    </div>

    <div class="text-danger mb-3" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="d-flex justify-content-center gap-2">
      <button class="btn btn-success" (click)="saveEmployee()">Save</button>
      <a routerLink="/employees" class="btn btn-secondary">Cancel</a>
    </div>
  </div>
</div>
